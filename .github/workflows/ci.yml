name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  e2e:
    name: E2E Tests
    if: ${{ vars.ENABLE_E2E == 'true' }}
    runs-on: ubuntu-latest
    needs: build
    env:
      LOCAL_DB_USER: postgres
      LOCAL_DB_PASSWORD: ${{ github.run_id }}
      LOCAL_DB_NAME: test_db
      LOCAL_DB_URL: postgresql://postgres:${{ github.run_id }}@localhost:54321/postgres
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: ${{ env.LOCAL_DB_PASSWORD }}
          POSTGRES_USER: ${{ env.LOCAL_DB_USER }}
          POSTGRES_DB: ${{ env.LOCAL_DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Supabase
        run: |
          docker run -d --name supabase-test \
            -e POSTGRES_PASSWORD="$LOCAL_DB_PASSWORD" \
            -e POSTGRES_USER="$LOCAL_DB_USER" \
            -e POSTGRES_DB="$LOCAL_DB_NAME" \
            -p 54321:5432 \
            supabase/postgres:15
          sleep 10

      - name: Run database migrations
        run: pnpm db:push
        env:
          SUPABASE_DB_URL: ${{ env.LOCAL_DB_URL }}

      - name: Seed database
        run: pnpm db:seed
        env:
          SUPABASE_DB_URL: ${{ env.LOCAL_DB_URL }}

      - name: Start Next.js server
        run: |
          pnpm dev &
          sleep 10

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          start: false
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: demo-anon-key
          SUPABASE_SERVICE_ROLE_KEY: demo-service-role-key
          SUPABASE_DB_URL: ${{ env.LOCAL_DB_URL }}
